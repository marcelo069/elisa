<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Desde que ella llegó</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Dancing+Script:wght@500&display=swap"
        rel="stylesheet">

</head>

<body>
    <header class="header">
        <h1 class="titulo">Desde que ella llegó</h1>
        <p class="subtitle">
            Una nota sobre todo lo que me pasó y lo que siento.
        </p>

    </header>

    <main>
        <div class="contenedor">
            <input type="checkbox" id="abrir">
            <label for="abrir" class="carta">
                <div class="sobre">
                    <div class="tapa"></div>
                    <div class="sello"></div>
                </div>
                <div class="papel">
                    <div class="contenido">
                        <section class="bloque">
                            <h2 class="titulo-carta">Sobre ella</h2>
                            <p>
                                Elisa Soto: ese es el nombre de la persona que me gusta mucho. Siento que no tengo
                                muchas posibilidades de estar con ella,
                                ya que, por mi culpa, están ocurriendo cosas que no deberían ocurrir.
                                Por mi culpa, mi relación de amistad está mal;
                                por mi miedo y mis nervios al hablarle, cada vez hablamos menos.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Mis miedos</h2>
                            <p>
                                Solo quiero estar con ella, pero cada vez que tengo la oportunidad de hablarle, la
                                arruino, porque
                                suelo quedarme en mi
                                silla esperando un buen momento. Nunca tuve el valor para decirle las cosas a la cara.
                                Soy muy
                                miedoso; no puedo aguantar
                                los nervios.
                            </p>
                            <p>
                                Solo quiero hablarle y arreglar las cosas. Quiero estar a su lado y ser feliz. Solo
                                quiero estar con
                                ella, y solo con ella.
                                No quiero estar con nadie más. Quiero que sea ella; nadie más está en mi mente en todo
                                el día.
                            </p>
                            <p>
                                Tengo una carta hecha a mano que aún no le he entregado. Quería esperar un buen momento
                                para
                                dársela, pero he esperado demasiado y siento que debería hacerlo ya. Mientras más me
                                demoro en
                                dársela, más me carcome la cabeza y menos puedo pensar con claridad. Solo quiero que
                                todo esto
                                acabe; quiero poder estar con ella. Quiero que nada de esto hubiera pasado.
                            </p>
                            <p>
                                Mañana tendré el valor de hablarle para decirle todo lo que pasa por mi mente. Quiero
                                decirle todo
                                para no tener más inconvenientes. Quiero que todo esto acabe pronto; no quiero sufrir
                                más (yo mismo
                                me hago sufrir al sobrepensarlo todo). Simplemente no quiero que ella esté mal. Sé que
                                el hecho de
                                no hablarle puede hacerla pensar que ya no quiero estar con ella, pero en realidad estoy
                                teniendo un
                                dilema mental en el cual voy perdiendo.
                            </p>
                            <p>
                                Solo quiero que ella lo sepa todo para poder estar más tranquilo. Quiero que ella sea
                                feliz, pero
                                mientras más me demoro en decírselo, más imposible parece que todo mejore.
                            </p>
                            <p>
                                No quiero que ella comprenda o entienda lo que estoy pasando; solo quiero que escuche lo
                                que tengo
                                que decirle para que no tengamos más malentendidos. Es más, si ella quiere dejar de
                                hablarme, lo
                                comprenderé al 100%, porque he hecho cosas que nunca debí hacer. Si eso es lo que ella
                                quiere, o si
                                siente que es lo mejor, no intentaré detenerla. Ella es libre de hacer lo que desee; no
                                voy a
                                retener sus pensamientos ni sus decisiones.
                            </p>
                            <p>
                                Solo quiero estar con ella, pero después de todo lo que he hecho y dicho, no creo que
                                quiera estar
                                conmigo. No quiero que me entienda o que comprenda por lo que estoy pasando; solo quiero
                                que lo sepa
                                para que no piense que no quiero hablarle.
                            </p>
                            <p>
                                Si tan solo tuviera la fuerza mental y la valentía para poder hablarle, nada de esto
                                estaría
                                pasando. Esto me ocurre por ser miedoso, por no tener el valor de hablarle, por no
                                sentirme seguro,
                                por no tener la madurez necesaria para hacerla sentir bien.
                            </p>
                            <p>
                                Sé que todo lo que estoy haciendo está mal, y lo tengo claro, pero no sé qué más hacer.
                                He intentado
                                mejorar muchas veces, pero no lo logro.
                            </p>
                            <p>
                                Quiero decirle todo lo que hice mal, pero con suerte tengo el valor de mirarla desde
                                lejos. Solo
                                quiero amarla para siempre; quiero hacerla feliz, quiero que le pasen cosas buenas y que
                                se divierta
                                lo más que pueda. Y sé que, si está conmigo, no lo logrará, por mis problemas y por la
                                actitud tan
                                mala que a veces tengo. No suelo resolver bien mis problemas: o escapo de ellos, o
                                simplemente no
                                los arreglo nunca.
                            </p>
                            <p>
                                Quiero hablarle de nuevo; quiero entregarle una carta que tengo guardada, pero por el
                                miedo que
                                tengo no he podido dársela. Tengo miedo de que ella me diga que ya no quiere nada
                                conmigo, o que
                                ahora le gusta alguien más. Tengo mucho miedo de cosas que sé que no son verdad, pero yo
                                mismo me
                                creo esas ideas erróneas. Aun sabiendo que no es así, igual tengo mucho miedo de
                                hacerlo.
                            <p>
                            </p>
                            <p>
                                Si tan solo ella pudiera escuchar todos los pensamientos que tengo sobre ella, se daría
                                cuenta de
                                cuánto me importa y sabría cuánto la quiero. No solo eso: también la admiro mucho. Ella
                                ha logrado
                                hacer cosas que yo no soportaría. A pesar de todo eso, siempre se muestra alegre; nunca
                                se le ve
                                mal. Siempre intenta no dejarse caer y seguir adelante, sin importar lo difícil que sea
                                lo que está
                                viviendo.
                            </p>
                            <p>
                                Ella es una persona digna de ser admirada. Además, es muy inteligente: aprende muy
                                rápido y tiene
                                una lógica increíblemente buena; puede llegar a comprender las cosas con mucha
                                facilidad.
                            </p>
                            <p>
                                Ella es espectacular en todos los aspectos.
                            </p>
                            <p>
                                Quiero poder expresarme bien para decirle todo lo que siento por ella. Quiero decirle
                                todo lo que me
                                gusta de ella.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Lo que siento</h2>
                            <p>
                                Quisiera decirle que sus ojos bonitos brillan como una estrella fuera de esta galaxia.
                                Quisiera decirle que su voz es como el sonido del espacio. Quisiera decirle que su
                                rostro es como un sol brillante y radiante.
                            </p>
                            <p>
                                Quisiera decirle que su pelo es lindo incluso cuando lo cambia. Quisiera decirle que
                                nunca me ha importado cómo se vea; para mí, siempre se ve bien. Quisiera decirle que
                                su presencia ilumina la oscuridad de mi corazón.
                            </p>
                            <p>
                                Quisiera decirle que ella es la luz en un bosque embrujado. Quisiera decirle que es
                                quien le da valor a mi risa. Ella es todo lo que a mí me hace feliz.
                            </p>
                            <p>
                                Solo quiero que ella sepa todo lo que siento por ella. No importa si ella ya no quiere
                                estar conmigo; yo sí quiero estar con ella. Sé que uno tiene que luchar por lo que ama,
                                y lo voy a intentar siempre que pueda seguir.
                            </p>
                            <p>
                                Sé que cuando ella tome una decisión especial, tendré que irme de su lado, tendré que
                                buscarme a mí mismo y respetar su decisión.
                            </p>
                            <p>
                                Cuando inició el año, no quería estar con alguien; quería estar solo y pasarlo bien con
                                mis amigos. Estaba feliz, sin preocupaciones, sin la necesidad de depender de alguien.
                                Estaba bien estando solo.
                            </p>
                            <p>
                                Pero un día, de la nada, la vi. Pensé que sería como siempre: una amiga más o alguien
                                con quien hablaría de vez en cuando. Pero no quería aceptar que ella me estaba gustando
                                mucho. No sabía qué hacer, pero terminé aceptando que de verdad me estaba enamorando de
                                alguien.
                            </p>
                            <p>
                                Ella llegó cuando yo estaba bien conmigo mismo, cuando no quería nada con nadie… y ahora
                                quiero todo con ella. No necesito de ella para ser feliz, pero siempre que puedo, quiero
                                estar a su lado. Porque ella es la que más me hace reír, es con quien mejor la paso.
                            </p>
                            <p>
                                No es una simple amiga; ahora es alguien con quien quiero pasar toda esta vida.
                            </p>
                            <p>
                                Me gusta mucho Elisa, pero es irónico, porque nunca puedo decírselo a la cara. Es
                                primera
                                vez que me pasa esto, porque nunca he sido de tener miedo de decir lo que siento o
                                pienso.
                                Es mi primera vez sintiendo algo tan grande por alguien que ni siquiera las palabras más
                                chicas salen de mi boca.
                            </p>
                            <p>
                                Siento que puedo expresar mucho, pero no sé si ella se sienta cómoda con eso, y ese
                                también es un limitante para no poder expresarme bien. Quisiera tener el valor para
                                poder
                                decirle todo lo que siento.
                            </p>
                            <p>
                                Quiero estar con ella, pero no sé qué hacer. Ella poco a poco se está alejando de mí, y
                                no sé qué hacer con eso. Siento mucho miedo de hacer cualquier cosa. No sé qué hacer con
                                este sentimiento, ya que nunca me había sentido de esta manera.
                            </p>
                            <p>
                                Me siento muy cansado, no solo físicamente; también lo estoy mentalmente. Siento que
                                todos mis días son una pesadilla viviente. No sé qué hacer en todo el día: me siento en
                                mi cama y me empiezo a aburrir; antes no era de esta manera.
                            </p>
                            <p>
                                Ahora, cada cosa que hago me aburre. Cuando me estoy divirtiendo, me acuerdo de ella.
                                Ella siempre está en mi mente, pero el problema es que yo sé que no le importo para
                                nada.
                            </p>
                            <p>
                                Sé que tengo que mejorar como persona y no será por ella, ya que tengo que hacerlo por
                                mí mismo y no por alguien más. Tengo que aprender de todos los errores que he cometido a
                                lo largo de mi vida.
                            </p>
                            <p>
                                Ya descansé demasiado, es hora de adoptar una nueva mentalidad. Tengo que aprender de
                                todo lo que pase, solo para que no me pase de nuevo.
                            </p>
                            <p>
                                Aún me gusta, aún quiero estar con ella, pero esta vez tendré que irme de su lado. Esto
                                lo hago por mí; ya sufrí mucho por los demás, ahora quiero preocuparme más de mí mismo.
                                No sé en qué momento dejará de gustarme, pero no creo que sea pronto.
                            </p>
                            <p>
                                Tengo una carta que quiero entregarle, que por tener miedo no he podido dársela. Le
                                quiero entregar la carta el lunes, le diré lo que siento y lo intentaré una última vez,
                                pero si no lo logro, aceptaré todo lo que suceda.
                            </p>
                            <p>
                                Me alejaré de nuevo para empezar de nuevo, pero con una nueva mentalidad, en la cual me
                                preocuparé de mí y de nadie más, como lo hacía el año pasado.
                            </p>
                            <p>
                                Logré superar todo lo que pensaba que no podría lograr. Decidí no temer nunca más. A
                                pesar de todo, sigo teniendo miedo a muchas cosas, pero trato de afrontarlas. No volveré
                                a huir de mis problemas.
                            </p>
                            <p>
                                Ya no quiero ser el niño que siempre huye de los problemas; ahora solo quiero ser
                                alguien
                                más fuerte. Solo quiero mejorar, y sé que puedo hacerlo.
                            </p>
                            <p>
                                Ahora solo quiero que todo en mi vida cambie, no mi entorno, sino mi forma de ser y mi
                                forma de afrontar las cosas.
                            </p>
                            <p>
                                Hoy logré darme cuenta de muchas cosas de las cuales no me enorgullezco. Trato de
                                mejorar, pero no siempre lo logro. Aun así, quiero cambiar para tener la valentía
                                suficiente para decirle todo de una vez por todas.
                            </p>
                            <p>
                                Solo quiero decirle todo lo que siento por ella; no quiero quedarme con estos
                                sentimientos guardados. Solo quiero que ella sepa todo para poder estar más tranquilo.
                            </p>
                            <p>
                                Quiero decirle todo lo que hice mal para ver si puedo volver a intentarlo o no. Solo
                                quiero que ella me perdone por no ser tan valiente y rendirme tan fácil.
                            </p>
                            <p>
                                También quiero que ella entienda el porqué me alejé sin decirle nada al respecto.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">La carta</h2>
                            <p>
                                Hola Elisa, lamento el haberte dejado de hablar durante mucho tiempo. La razón fue que
                                tenía mucho miedo y no sabía cómo poder afrontarlo.
                            </p>
                            <p>
                                Yo sabía que, si no lo lograba, tú dejarías de hablarme. La cosa es que terminó
                                sucediendo y ahora ya no sé qué hacer.
                            </p>
                            <p>
                                Solo quiero poder arreglar las cosas para poder volver a hablar contigo. No quiero que
                                esta historia termine por una razón tan estúpida, y lo peor de todo es que soy yo el que
                                provocó todo esto.
                            </p>
                            <p>
                                Me arrepiento de no haber sido lo suficientemente valiente para poder decirte todo lo
                                que
                                siento por ti, y ahora estoy pagando el precio, alejándome de ti y sufriendo mucho.</p>
                            <p>
                                Solo quiero que termine siendo una bonita historia, y quiero que tú seas la persona que
                                me acompañe. No quiero que otra persona esté conmigo, porque mis ojos y mi mente no
                                pueden estar mirando o pensando en alguien más.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Reflexión final</h2>
                            <p>
                                Hoy solo quiero estar con ella. Muchos podrán pensar que quiero estar con ella porque me
                                siento
                                solo, y no es verdad, porque cuando estoy feliz, triste o serio, siempre pienso en lo
                                bien que la
                                pasaría estando con ella.
                            </p>
                            <p>
                                No necesito sentirme solo para querer estar con ella, ya que no la quiero para pasar un
                                rato hasta
                                sentirme mejor. Lo que yo quiero es estar con ella para siempre y que podamos estar bien
                                los dos,
                                sin depender uno del otro.
                            </p>
                            <p>
                                Solo quiero volver más fuerte para poder hablarle de nuevo.
                            </p>
                            <p>
                                Además, mi mamá una vez me dijo: “Nunca le pidas perdón a una persona, ya que solo se le
                                pide perdón
                                al Señor”.
                                Pero yo siempre he querido creer que también tienes el derecho de pedir perdón cuando
                                sabes que
                                estás mal, y que no es necesario que siempre sea al Señor.
                            </p>
                            <p>
                                Aún tengo mucho miedo de lo que pueda pasar y no estoy muy seguro de si hacerlo o mejor
                                dejar todo
                                como está.
                                Sé que mi yo del futuro no me lo perdonará nunca, pero no sé qué hacer ahora y el miedo
                                me consume.
                                No quiero seguir porque no estoy seguro de lo que pase en el futuro; no estoy seguro de
                                si ella me
                                perdonará o si querrá volver a hablar conmigo.
                            </p>
                            <p>
                                Simplemente soy tan miedoso que no sé si seguir adelante o quedarme viendo lo que pasa,
                                como el
                                cobarde que siempre fui.
                            </p>
                            <p>
                                Lo peor es que siempre digo que antes era del tipo de persona que nunca le temía a nada,
                                el que
                                nunca supo cómo llorar o el que nunca sufrió por amor. Ahora todos piensan que soy una
                                especie de
                                piedra que por fin pudo destruirse, pero lo que no saben es que esta piedra nunca estuvo
                                completa;
                                siempre estuvo hecha pedazos.
                            </p>
                            <p>
                                Nunca supe cómo decir la verdad y siempre terminaba mintiéndoles a todas las personas
                                que
                                simplemente querían ayudarme o conocerme. Yo nunca fui de confiar en alguien, y por esa
                                razón
                                siempre mentí acerca de cómo me sentía o de cómo fue mi niñez.
                            </p>
                            <p>
                                Estoy tratando de confiar en las personas y darles otra oportunidad, para que todos
                                sepan la verdad
                                de mí. Ya no quiero volver a huir o a correr de la persona que realmente soy; solo
                                quiero que todos
                                vean que sí soy alguien frágil.
                            </p>
                            <p>
                                Aunque no es lo que ellos quieren ver de mí, ya no sé qué más seguir inventando para que
                                piensen que
                                soy alguien fuerte. Ya no sé qué más hacer para que todo esto deje de suceder.
                            </p>
                            <p>
                                Le hablé de nuevo y le pedí perdón por todo. Ella aceptó y me perdonó. Solo que ahora
                                seguiremos
                                siendo amigos y nada más.
                            </p>
                            <p>
                                Gracias a que ella me perdonó, pude darme cuenta de muchas cosas de las cuales pensé que
                                era
                                estúpido. Por fin pude perdonarme a mí mismo por todo lo que hice.
                            </p>
                            <p>
                                Ahora puedo ser yo mismo y ya no tengo que fingir. Por fin puedo ver las cosas como
                                realmente son.
                                Ya no es necesario pasar por otras fases para poder aprender.
                            </p>
                            <p>
                                Trataré de seguir adelante sin lamentarme de nada, ya que gracias a que pude perdonarme
                                ahora puedo
                                pensar y decidir por mí mismo. Ahora soy yo mismo, sin la necesidad de fingir.
                            </p>
                            <p>
                                Aún me gusta y todo, ya que no creo poder olvidarla en un largo tiempo. Pero aun así, no
                                tengo
                                ninguna necesidad de olvidarla ni de perderla de nuevo, ya que pienso hacer toda mi vida
                                sin la
                                necesidad de tener que lamentarme por las cosas que hago.
                            </p>
                            <p>
                                Pienso mejorar y dar mi 100 %. Esta vez no caeré tan fácil.
                            </p>
                            No pienso alejarme otra vez. Pero si es necesario, tendré que hacerlo sin dudar de nada.
                            <p>
                                El miedo que tengo no se irá nunca y, por eso, tendré que seguir sin retroceder. El
                                miedo es algo
                                que nos impide hacer muchas cosas, pero esta vez será mi núcleo de motivación para
                                seguir.
                            </p>
                            <p>
                                Aunque siempre quise pasar todo mi tiempo con ella, al parecer no se pudo. Pero ahora
                                tendré que ver
                                las cosas por mí, y no por alguien más.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Ahora si soy yo</h2>
                            <p>
                                Llevo un aproximado de dos meses sin hablar, y gracias a eso pude superarme a mí mismo.
                            </p>
                            <p>
                                Ella nunca fue una distracción para mí, pero el hecho de pensar mucho en ella sí me
                                limitaba.
                            </p>
                            <p>
                                El primero de enero me dispuse a mejorar y superarme en todo aspecto, solo para que
                                cuando vuelva a ser yo mismo por completo poder volver a hablarle.</p>
                            <p>
                                Poco a poco me fui deshaciendo de mis miedos y nerviosismo, solo para ser mejor y poder
                                encontrarme.
                            </p>
                            <p>
                                Llevaba mucho tiempo sin saber quién era yo o qué cosas me gustaban, pero en estos
                                últimos meses me fui dando cuenta de que tenía que ser yo mismo.
                            </p>
                            <p>
                                Hace poco me fui conociendo más, logré encontrar mis gustos y mi personalidad.
                            </p>
                            <p>
                                También una cosa que destaco es que por fin encontré un propósito para seguir.</p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Ya lo entiendo todo</h2>
                            <p>
                                Estuve cerca de 3 meses cambiando y mejorando mi forma de ser.
                            </p>
                            <p>
                                Pensé que si lo hacía todo sería mejor y podría volver a hablar con Elisa, pero hace
                                poco me dijeron que ella siempre me quiso con todo y defectos.
                            </p>
                            <p>
                                Ella nunca necesitó que yo fuera perfecto o que fuera el hombre de sus sueños; ella
                                me quiso tal y como yo era.
                            </p>
                            <p>
                                Eso me jugó en contra, ya que yo pensé que todo lo que estaba haciendo mal había
                                arruinado todo lo que yo tenía con ella.
                            </p>
                            <p>
                                Lo que realmente arruinó todo fue mi manera de expresarme.
                            </p>
                            <p>
                                Cuando la veía en persona hablábamos poco y yo no solía decir muchas cosas románticas.
                            </p>
                            <p>
                                Pero por mensaje yo le decía muchas cosas lindas.
                            </p>
                            <p>
                                Al parecer eso fue lo que arruinó todo: el hecho de no poder hablar con confianza y
                                decirle todo en persona hizo que todo se fuera a la mierda.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Ahora lo dare todo</h2>
                            <p>
                                Ahora intentaré mejorar en base a mi personalidad y aspecto. No dejaré de ser yo mismo
                                para poder mejorar, pero sí intentaré que todas las cosas que hacía mal dejen de ser un
                                defecto.
                            </p>
                            <p>
                                Intentaré mejorar para esta vez volver a hablarle, pero con más confianza y sin miedo,
                                ya que aún me gusta Elisa y no creo que dejarla ir tan fácil sea lo mejor. Estoy seguro
                                de que ella está mejor sin mí, pero quiero volver a intentarlo, esta vez sin miedo y
                                siendo realmente quien debía ser en ese entonces.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Ya le entiendo todo</h2>
                            <p>
                                Ahora sé que no importa lo que digan o lo que pase, no debo dejar de ser quien soy.
                                Nunca debo cambiar por la sociedad, ni por alguien que no merezca estar conmigo, pero
                                esta vez es diferente.
                            </p>
                            <p>
                                Ya no me importa qué digan de mí. Ahora me comporto como realmente me siento cómodo; no
                                trato de aparentar algo que no soy.
                                El único cambio que haré con gusto y para un bien mayor será mi actitud y mi forma de
                                ser. Esa es la única manera de poder volver a hablar con Elisa.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Pense que todo termino</h2>
                            <p>
                                Sé que no soy la persona indicada para decir que es muy fácil cambiar o mejorar. Es
                                algo estúpido, porque hasta hoy no he podido mejorar del todo o hacer un cambio
                                drástico.
                            </p>
                            <p>
                                Pensé que si cambiaba o mejoraba, podría olvidarme de lo que pasó y poder seguir
                                adelante. Pensé que podría superarla y seguir avanzando sin ningún problema o
                                dificultad, pero al parecer esto está siendo más difícil de lo que creí.
                            </p>
                            <p>
                                Ahora me doy cuenta de que debo aceptar lo que siento por ella y no evitarlo como lo
                                hice el año pasado, ya que eso me complicó más de lo que yo creía.
                            </p>
                            <p>
                                Además, en el momento en que no acepté mis sentimientos estuve peor de lo que pensé.
                                Por eso este año será diferente: quiero poder expresarme y poder tener todas mis
                                emociones, sin reprimir ninguna de ellas como lo hacía anteriormente.
                            </p>
                            <p>
                                Solo quiero ser igual a los demás. No quiero reprimirme por lo que dicen los demás ni
                                ser alguien con una sola cara; eso no se siente para nada bien.
                            </p>
                            <p>
                                Quiero ser normal: poder sentir emociones, llorar frente a alguien, enojarme con
                                alguien, reír de verdad con alguien, etc.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Sueños</h2>
                            <p>
                                Hace unos pocos días empecé a soñar con ella y todos los sueños han sido diferentes;
                                no siguen algún patrón o coherencia. Los sueños que he tenido son muy distintos.
                            </p>
                            <p>
                                También otra cosa que tengo que recalcar es que no suelo recordar los sueños que
                                tengo, pero estos últimos sueños que he tenido los recuerdo bien, y ella ha estado
                                presente en cada uno de ellos.
                            </p>
                            <p>
                                Lo peor es que no entiendo el porqué aparece en ellos y tampoco le encuentro un
                                significado al hecho de que ella esté presente.
                            </p>
                            <p>
                                En uno de los sueños, ella tenía el pelo teñido de rosa (tal y como la conocí el año
                                pasado), pero lo que me sorprendió es que tenía el mismo corte de pelo de este año.
                            </p>
                            <p>
                                Además, cuando ella entró a la sala me miró y me sonrió. En ese momento, aun estando
                                en un sueño, sentí algo lindo; me sentí feliz y como si eso realmente hubiese pasado.
                            </p>
                            <p>
                                En otro sueño que tuve, ella y yo estábamos afuera del lugar donde desayunamos y
                                almorzamos, y la cosa es que ella y yo estábamos hablando como si nunca hubiésemos
                                dejado de hablar.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">La tarjeta</h2>
                            <p>
                                Hasta el día de hoy guardo una tarjeta que tenía dos stickers que ella me regaló. Aún
                                los guardo porque es un lindo recuerdo que tengo de ella cuando aún hablábamos.
                            </p>
                            <p>
                                Yo dije que esta tarjeta desaparecería en cuanto yo deje de estar enamorado de ella, y
                                ese día aún no ha llegado; por esa razón la conservo.
                            </p>
                            <p>
                                Además, siento que la tarjeta me transmite mucha más confianza de la que tengo y me
                                ayuda cuando siento que no puedo.
                            </p>
                            <p>
                                Cuando miro la tarjeta siento que puedo hacer muchas cosas que no podría hacer solo.
                                Siento que la tarjeta me brinda una paz y tranquilidad; gracias a eso he podido seguir
                                superándome día a día.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Las quinientas lineas</h2>
                            <p>
                                Tengo pensado que cuando esta carta tenga quinientas o más líneas, le diré todo a
                                Elisa y le contaré todo lo que pasó conmigo y el porqué de mi actuar del año pasado.
                            </p>
                            <p>
                                No me gustaría quedarme con todo en las manos e irme sin decirle todo. Si ella me
                                rechaza o me acepta, ganaré de igual manera, ya que podré seguir con o sin ella, y de
                                las dos maneras podré mejorar como persona.
                            </p>
                            <p>
                                Quisiera que ella me aceptara después de todo, pero estoy seguro de que no lo hará. No
                                creo que ella perdone todo lo que hice, pero sí me gustaría que lo hiciera.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Hable con mis amigos de esto</h2>
                            <p>
                                Este último tiempo se notó mucho mi cambio, y les avisé a mis amigos que este año verán
                                a un Marcelo diferente del que ellos conocen. También les conté algunas cosas que tengo
                                planeadas a futuro.
                            </p>
                            <p>
                                Akon es el que más sabe de todo lo que está pasando. También le envié el prototipo de
                                la carta que tengo y le conté todo lo que me ha estado pasando y todo lo que estoy
                                pasando.
                            </p>
                            <p>
                                Isaac y Jesús son los que están al día con la historia de Elisa, pero no de todo lo que
                                estoy pasando ahora mismo.
                            </p>
                            <p>
                                Además, ellos quieren que ya supere a Elisa y que ya pase página. Quieren que busque a
                                alguien más, que es lo que yo merezco.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Qué hare?</h2>
                            <p>
                                En el momento en el que hable con ella le dejaré todo claro, ya que en el tiempo en el
                                que hablábamos ella siempre se guio por lo que ya sabía, y yo me guiaba por lo que
                                sentía y por lo que ella quería.
                            </p>
                            <p>
                                Trataré de que todo salga bien para poder volver a hablar con ella y poder darlo todo
                                para tener algo, aunque los demás digan que es estúpido por lo que sucedió, intentaré
                                guiarme por lo que creo que está bien.
                            </p>
                            <p>
                                Este año me comportaré más egoísta y cumpliré con todo lo que quiero. No será como los
                                anteriores años en los que siempre ayudaba a los demás y nunca me di un tiempo para mí.
                            </p>
                            <p>
                                Gracias a eso perdí muchas veces yo solo, y esta vez será diferente.
                            </p>
                            <p>
                                No quisiera dejar a los demás solos, pero este año solo velaré por mí y por nadie más.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Mi futuro</h2>
                            <p>
                                Hace poco encontré mis metas a cumplir a futuro. Ya sé lo que quiero hacer y tengo
                                solo dos metas por el momento.
                            </p>
                            <p>
                                Una de ellas es tener una bonita familia, una esposa e hijos, a los cuales yo cuidaré
                                y protegeré.
                            </p>
                            <p>
                                Quiero que mi futura familia tenga una linda casa y una linda vida. Quiero que mi
                                futura esposa pueda hablar y no callar, educar y no complacer, llorar y nunca caer.
                            </p>
                            <p>
                                Y quiero que mis futuros hijos e hijas puedan confiar sin temer, avanzar y poder
                                aprender, avanzar sin dolor.
                            </p>
                            <p>
                                Y la segunda meta que tengo a futuro es volverme uno de los mejores boxeadores del
                                mundo. No quiero ser el número 1 del boxeo, solo quiero ser reconocido por ser uno de
                                los mejores.
                            </p>
                            <p>
                                Quiero hacerlo porque antes de que naciera mi sobrina no quería nada del boxeo, solo
                                practicar por deporte.
                            </p>
                            <p>
                                Pero dije que ella tendría un tío boxeador, y cuando nació empezaron los problemas, y
                                ahora solo quiero ser profesional para que ella, cuando crezca, pueda hablar de mí con
                                seguridad y se sienta orgullosa de mí.
                            </p>
                            <p>
                                Solo quiero que mi sobrina me note (ya que solo la he visto una sola vez).
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Lo que quiero</h2>
                            <p>
                                Quisiera poder sentirme seguro de mí mismo, no solo al hablar, sino también en mi
                                actuar y en mi forma de ser. No quiero ser una persona insegura.
                            </p>
                            <p>
                                Poco a poco estoy logrando muchas cosas. Estoy logrando cosas que quiero y cosas que
                                quería. Ahora mismo estoy en uno de mis mejores momentos; se podría decir que este
                                será uno de mis mejores años.
                            </p>
                            <p>
                                También quiero incluir que poco a poco estoy haciendo cosas que antes me incomodaban
                                mucho, ya que era uno de los defectos que tenía y aún tengo.
                            </p>
                            <p>
                                Pero poco a poco los estoy convirtiendo en parte de lo que soy realmente, ya que no
                                tengo la necesidad de esconder todo lo que soy.
                            </p>
                            <p>
                                Esta vez seré yo mismo, sin la necesidad de ser alguien que los demás quieren ver. Me
                                convertiré en lo que siempre quise ser, en la persona con la que siempre soñé poder
                                ser.
                            </p>
                            <p>
                                Esta vez no me esconderé de quien soy realmente. No tengo esa necesidad de esconder
                                mis miedos o mis defectos, ya que eso es lo que más me da vida en estos momentos.
                            </p>
                            <p>
                                Y si ella me quiso con todo y defectos, estoy seguro de que yo también puedo hacerlo.
                                Estoy seguro de que no tengo que esconderme de nuevo.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">Ya se que hacer</h2>
                            <p>
                                El viernes 27 de marzo le hablé a la Elisa. Ella me dio una respuesta que me dejó
                                sorprendido; no era lo que me esperaba. Al final sí me perdonó.
                            </p>
                            <p>
                                Ahora que soy alguien diferente a lo que era el año pasado, intentaré no arruinarlo
                                otra vez. Intentaré hacer todo bien para poder estar con ella en una relación formal.
                            </p>
                            <p>
                                Intentaré no hablar tanto las cosas; dejaré que todas mis acciones hablen por mí esta
                                vez. No dejaré que mi cerebro me juegue en contra otra vez.
                            </p>
                            <p>
                                Quiero que me dé otra oportunidad para poder tener una relación. Puede que ella me
                                haya perdonado, pero eso no significa que pueda relajarme y ser el mismo del año
                                pasado.
                            </p>
                            <p>
                                Dejaré todo en las acciones, le daré detalles e intentaré ser mucho mejor esta vez.
                            </p>
                            <p>
                                No suelo hacer promesas al aire, porque las últimas dos promesas que hice se esfumaron,
                                pero esta vez no será así. Me prometeré a mí mismo ser mejor para poder estar con
                                Elisa.
                            </p>
                            <p>
                                Ahora tengo dos promesas por cumplir: ser uno de los mejores boxeadores del mundo y
                                ser mejor persona para poder estar con Elisa (Esta vez todo será diferente; tengo un
                                buen presentimiento).
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">¿Es este el final?</h2>
                            <p>
                                Con todo lo que estoy pasando siento que mi final se está acercando, y esta vez no
                                hablo de algo físico como vendría a ser mi muerte. Estoy hablando de todo lo que estoy
                                viviendo estos días.
                            </p>
                            <p>
                                Siento que ya lo perdí todo, aunque ya pude arreglar las cosas con Elisa, ahora no sé
                                qué hacer.
                            </p>
                            <p>
                                Logré hacer un cambio drástico en mi vida, pero ahora que ya hice lo que quería hacer,
                                no sé cómo continuar con esto.
                            </p>
                            <p>
                                Tengo un plan de 2 meses, pero no estoy seguro de si va a funcionar o no. El plan
                                consta de 4 simples pasos; no me debería tomar mucho tiempo lograr esto.
                            </p>
                            <p>
                                Paso 1: Hablar poco a poco con ella, como si nos estuviéramos conociendo de nuevo.
                            </p>
                            <p>
                                Paso 2: Empezar una nueva amistad y cambiar todo mi comportamiento.
                            </p>
                            <p>
                                Paso 3: Darle unos pequeños regalos, como podrían ser cartas, dibujos o comprarle
                                algunas cosas.
                            </p>
                            <p>
                                Paso 4: Declararme con una carta formal y, si en ese momento logro tener dinero,
                                comprarle unas flores.
                            </p>
                        </section>
                        <section class="bloque">
                            <h2 class="titulo-carta">¿Quién soy yo?</h2>
                            <p>
                                Estos 3 meses me di cuenta de quién soy yo y en esta última parte dejaré todo claro.
                                Dejaré escritos mis gustos, mis pasatiempos, mis personas favoritas, mis sentimientos,
                                etc.
                            </p>
                            <p>
                                - Mi película favorita es Pixeles; es una película muy buena, aunque tenga muchas
                                críticas.
                            </p>
                            <p>
                                - Mi serie favorita es Alice in Borderland; es una serie muy buena, aunque sea asiática.
                            </p>
                            <p>
                                - Mis animes favoritos son Inazuma Eleven y Blue Lock; me motivaron mucho hasta el día
                                de hoy.
                            </p>
                            <p>
                                - Mi caricatura favorita es Gravity Falls; es una serie muy loca y bonita.
                            </p>
                            <p>
                                - Mi comida favorita es la lasaña; por el queso y la salsa, espectacular el sabor.
                            </p>
                            <p>
                                - Mi pasatiempo favorito es hablar con mis amigos; ellos me hacen reír mucho cuando
                                estoy mal.
                            </p>
                            <p>
                                - Mis personas favoritas son mi mamá, la Diana y la Elisa; ya que ellas marcaron un
                                antes y un después en toda mi vida.
                            </p>
                            <p>
                                - Lo que más suelo hacer es dormir, ver videos o escuchar música; eso me relaja mucho.
                            </p>
                            <p>
                                - Mi género musical es el rap friki; siento que es algo que me acompañó toda mi vida
                                hasta estos días.
                            </p>
                            <p>
                                - Mis colores favoritos son el verde y el naranja; son muy bonitos a la primera
                                impresión.
                            </p>
                            <p>
                                - Mis deportes favoritos son el fútbol y el boxeo.
                            </p>
                            <p>
                                - Mi juego favorito es Minecraft, solo por la nostalgia y por los recuerdos.
                            </p>
                            <p>
                                (Hasta hoy esos son todos los gustos que descubrí, pero no significa que deje de
                                descubrir otros gustos a futuro.
                                Estoy descubriendo más cosas de mí mismo, y esto no es tan fácil como yo lo creí.
                                Intentaré que todo sea rápido
                                para poder conocerme a mí mismo y descubrir mi sueño a futuro.)
                            </p>
                        </section>
                        <div class="firma">
                            Elisa
                        </div>
                        <div class="footer">
                            <p>Gracias por leer.</p>
                        </div>
