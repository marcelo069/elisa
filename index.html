<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Desde que ella llegó</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Dancing+Script:wght@500&display=swap"
        rel="stylesheet">

</head>

<body>

    <header class="header">

        <h1 class="titulo">Desde que ella llegó</h1>

        <p class="subtitle">
            Una nota sobre todo lo que me pasó y lo que siento.
        </p>

    </header>

    <main>

        <div class="contenedor">

            <input type="checkbox" id="abrir">

            <label for="abrir" class="carta">

                <div class="sobre">

                    <div class="tapa"></div>

                    <div class="sello">✉</div>

                    <div class="papel">

                        <div class="contenido">

                            <p>
                                PON AQUI TU PRIMER PARRAFO
                            </p>

                            <p>
                                PON AQUI TU SEGUNDO PARRAFO
                            </p>

                            <p>
                                PON AQUI TU TERCER PARRAFO
                            </p>

                            <div class="firma">

                                Elisa

                            </div>

                        </div>

                    </div>

                </div>

            </label>

        </div>

    </main>

    <footer class="footer">

        <p>Gracias por leer.</p>

    </footer>

</body>

</html>
